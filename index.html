// ── Helpers ──
const load = (k, d) => { try { return JSON.parse(localStorage.getItem(k)) || d; } catch { return d; } };

const getToken = () => load('tc-token', '');
const getStoredUser = () => load('tc-user', '');
const authHeaders = () => {
  const token = getToken();
  const h = { 'Content-Type': 'application/json' };
  if (token) h['Authorization'] = 'Bearer ' + token;
  return h;
};
const apiCall = async (path, opts) => {
  const res = await fetch(path, { headers: authHeaders(), ...opts });
  if (res.status === 401) { save('tc-token', ''); save('tc-user', ''); location.reload(); return {}; }
  return res.json();
};
const fmt = (n) => new Intl.NumberFormat('vi-VN').format(n);
const fmtShort = (n) => {
  if (n >= 1000000) { const m = n / 1000000; return (m % 1 === 0 ? m.toFixed(0) : m.toFixed(1).replace(/\.0$/, '')) + 'M'; }
  if (n >= 1000) { const k = n / 1000; return (k % 1 === 0 ? k.toFixed(0) : k.toFixed(1).replace(/\.0$/, '')) + 'k'; }
  return n.toString();
};
const today = () => new Date().toISOString().slice(0, 10);
const monthOf = (d) => d.slice(0, 7);

// Safe math evaluator for amount field (supports + - * /)
const evalAmount = (str) => {
  if (!str) return 0;
  const clean = str.replace(/[^0-9+\-*/.() ]/g, '').replace(/,/g, '');
  if (!clean) return 0;
  try {
    // Only allow numbers and math operators
    if (/^[\d+\-*/.()\s]+$/.test(clean)) {
      const result = Function('"use strict"; return (' + clean + ')')();
      const n = Math.round(Number(result));
      return isFinite(n) && n > 0 ? n : 0;
    }
  } catch {}
  return parseInt(clean.replace(/\D/g, '')) || 0;
};

// ── AI Receipt Scanner ──
async function scanImage(file) {
  const formData = new FormData();
  formData.append('image', file);
  const token = getToken();
  const headers = {};
  if (token) headers['Authorization'] = 'Bearer ' + token;
  const res = await fetch('/api/scan', { method: 'POST', body: formData, headers });
  const data = await res.json();
  return data.items || [];
}

const CATEGORIES = [

// Vietnamese names for display
const CAT_NAMES = {food:'Ăn uống',transport:'Di chuyển',shopping:'Mua sắm',entertainment:'Giải trí',bills:'Hóa đơn',health:'Sức khỏe',education:'Học tập',other:'Khác'};

// ── Smart Category Learning ──
// Learns keyword→category mapping from past expenses
const catMemory = {
  _data: load('tc-cat-mem', {}), // { keyword: { cat: 'food', n: 3 } }

  learn(detail, category) {
    if (!detail || !category || category === 'other') return;
    const keys = this._extractKeys(detail);
    keys.forEach(k => {
      const cur = this._data[k];
      if (!cur || cur.cat === category) {
        this._data[k] = { cat: category, n: (cur?.n || 0) + 1 };
      } else if (cur.cat !== category) {
        // User corrected: override with new category
        this._data[k] = { cat: category, n: 1 };
      }
    });
    save('tc-cat-mem', this._data);
  },

  suggest(detail) {
    if (!detail) return null;
    const keys = this._extractKeys(detail);
    let best = null;
    keys.forEach(k => {
      const m = this._data[k];
      if (m && (!best || m.n > best.n || k.length > (best.kLen || 0))) {
        best = { cat: m.cat, n: m.n, kLen: k.length, keyword: k };
      }
    });
    return best;
  },

  // Also check all stored keywords against a detail string
  suggestFromAll(detail) {
    if (!detail) return null;
    const lower = detail.toLowerCase().replace(/[^a-zàáảãạăắằẳẵặâấầẩẫậèéẻẽẹêếềểễệìíỉĩịòóỏõọôốồổỗộơớờởỡợùúủũụưứừửữựỳýỷỹỵđ0-9\s]/g, '');
    let best = null;
    for (const [k, v] of Object.entries(this._data)) {
      if (lower.includes(k) && (!best || k.length > best.kLen || (k.length === best.kLen && v.n > best.n))) {
        best = { cat: v.cat, n: v.n, kLen: k.length, keyword: k };
      }
    }
    return best;
  },

  _extractKeys(detail) {
    const lower = detail.toLowerCase().replace(/[^a-zàáảãạăắằẳẵặâấầẩẫậèéẻẽẹêếềểễệìíỉĩịòóỏõọôốồổỗộơớờởỡợùúủũụưứừửữựỳýỷỹỵđ0-9\s]/g, '');
    const words = lower.split(/\s+/).filter(w => w.length >= 2);
    const keys = [...words];
    // Also add 2-word combos for better matching
    for (let i = 0; i < words.length - 1; i++) {
      keys.push(words[i] + ' ' + words[i+1]);
    }
    // Add full string if short enough
    if (lower.length <= 30 && lower.length >= 2) keys.push(lower);
    return [...new Set(keys)];
  },

  // Batch learn from existing expenses
  learnBulk(expenses) {
    expenses.forEach(e => {
      if (e.detail) this.learn(e.detail, e.category);
    });
  }
};

// ── Duplicate Detection ──
function findDuplicates(expenses, date, amount) {
  if (!date || !amount || amount <= 0) return [];
  return expenses.filter(e => e.date === date && e.amount === amount);
}

function DateRangePicker({ from, to, onChangeFrom, onChangeTo }) {
  const presets = [
    { label: 'Hôm nay', fn: () => { const t = today(); onChangeFrom(t); onChangeTo(t); } },
    { label: 'Tuần này', fn: () => {
      const d = new Date(); const day = d.getDay() || 7;
      d.setDate(d.getDate() - day + 1);
      onChangeFrom(d.toISOString().slice(0,10)); onChangeTo(today());
    }},
    { label: 'Tháng này', fn: () => {
      const t = today(); onChangeFrom(t.slice(0,8) + '01'); onChangeTo(t);
    }},
    { label: 'Tháng trước', fn: () => {
      const d = new Date(); d.setDate(1); d.setMonth(d.getMonth() - 1);
      const first = d.toISOString().slice(0,10);
      d.setMonth(d.getMonth() + 1); d.setDate(0);
      onChangeFrom(first); onChangeTo(d.toISOString().slice(0,10));
    }},
    { label: 'Năm nay', fn: () => {
      const y = new Date().getFullYear();

  const remain = budget > 0 ? budget - total : 0;
  const monthLabel = month.slice(0, 4) === new Date().getFullYear().toString() ? 'Tháng ' + parseInt(month.slice(5)) : month;

  const handleSave = () => {

              class="w-28 px-2 py-1 text-xs rounded-lg focus:outline-none focus:ring-1 focus:ring-emerald-500"
              style="background:${dark ? '#1e293b' : '#fff'};border:1px solid ${dark ? '#475569' : '#d4d4d8'};color:${dark ? '#e2e8f0' : '#27272a'}"

            <p class="text-xs" style="color:${over ? '#f87171' : '#10b981'}">

function PieChart({ data, grandTotal }) {
  const [active, setActive] = useState(-1);
  const size = 160, cx = size/2, cy = size/2, r = 55;
  let cumAngle = -Math.PI / 2;
  const slices = data.map((d, i) => {
    const angle = (d.total / grandTotal) * Math.PI * 2;
    const startAngle = cumAngle;
    cumAngle += angle;
    const endAngle = cumAngle;
    const midAngle = (startAngle + endAngle) / 2;
    const largeArc = angle > Math.PI ? 1 : 0;
    const x1 = cx + r * Math.cos(startAngle), y1 = cy + r * Math.sin(startAngle);
    const x2 = cx + r * Math.cos(endAngle), y2 = cy + r * Math.sin(endAngle);
    const path = data.length === 1
      ? 'M '+cx+' '+(cy-r)+' A '+r+' '+r+' 0 1 1 '+(cx-0.001)+' '+(cy-r)+' Z'
      : 'M '+cx+' '+cy+' L '+x1+' '+y1+' A '+r+' '+r+' 0 '+largeArc+' 1 '+x2+' '+y2+' Z';
    const tipX = cx + (r * 0.65) * Math.cos(midAngle);
    const tipY = cy + (r * 0.65) * Math.sin(midAngle);
    return { ...d, path, tipX, tipY, idx: i };
  });
  const act = active >= 0 && active < slices.length ? slices[active] : null;
  return html`
    <svg width=${size} height=${size} viewBox="0 0 ${size} ${size}" onMouseLeave=${() => setActive(-1)}>
      ${slices.map(s => html`
        <path key=${s.id} d=${s.path} fill=${s.hex} opacity=${active === s.idx ? '1' : '0.8'}
          style="cursor:pointer;transition:opacity 0.15s"
          onMouseEnter=${() => setActive(s.idx)} onClick=${() => setActive(active === s.idx ? -1 : s.idx)} />
      `)}
      <circle cx=${cx} cy=${cy} r="30" class="fill-white dark:fill-zinc-800" />
      ${act ? html`
        <text x=${cx} y=${cy-6} text-anchor="middle" class="fill-zinc-800 dark:fill-zinc-200" style="font-size:9px;font-weight:700">${fmtShort(act.total)}</text>
        <text x=${cx} y=${cy+6} text-anchor="middle" style="font-size:8px;font-weight:600" fill=${act.hex}>${act.emoji} ${Math.round(act.total/grandTotal*100)}%</text>
      ` : html`
        <text x=${cx} y=${cy-4} text-anchor="middle" class="fill-zinc-800 dark:fill-zinc-200 text-[11px] font-bold">${fmtShort(grandTotal)}</text>
        <text x=${cx} y=${cy+10} text-anchor="middle" class="fill-zinc-400 text-[8px]">VNĐ</text>
      `}
    </svg>
  `;
}

function DailySpendingChart({ expenses }) {

  }, [expenses]);

  if (data.length < 2) return null;
  const max = Math.max(...data.map(d => d[1]));
  const avg = data.reduce((s,d) => s + d[1], 0) / data.length;
  const W = 300, H = 130, pad = 25, barW = Math.min(16, (W - pad) / data.length - 2);

  return html`

      <h3 class="text-sm font-semibold text-zinc-800 dark:text-zinc-200 mb-3">Chi tiêu hàng ngày</h3>
      <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto" onMouseLeave=${() => setActive(-1)}>
        <line x1="${pad}" y1="${pad + (1 - avg/max) * (H - pad*2)}" x2="${W}" y2="${pad + (1 - avg/max) * (H - pad*2)}" stroke="#a1a1aa" stroke-width="0.5" stroke-dasharray="3,3" />

        ${data.map((d, i) => {
          const barH = max > 0 ? (d[1] / max) * (H - pad*2) : 0;
          const x = pad + i * ((W - pad) / data.length) + ((W - pad) / data.length - barW) / 2;
          const y = H - pad - barH;
          const isActive = active === i;
          return html`
            <g key=${d[0]} onMouseEnter=${() => setActive(i)} onClick=${() => setActive(active === i ? -1 : i)} style="cursor:pointer">
              <rect x=${x} y=${y} width=${barW} height=${barH} rx="2" fill=${isActive ? '#059669' : '#10b981'} opacity=${isActive ? '1' : '0.8'} />

              ${isActive && html`
                <rect x=${x + barW/2 - 28} y=${y - 18} width="56" height="16" rx="4" fill="#18181b" opacity="0.9" />
                <text x=${x + barW/2} y=${y - 7} text-anchor="middle" fill="white" style="font-size:7px;font-weight:600">${fmtShort(d[1])}</text>
              `}
            </g>
          `;
        })}
      </svg>

    </div>
  `;
}

  const data = useMemo(() => {
    const days = [0,0,0,0,0,0,0];
    const counts = [0,0,0,0,0,0,0];
    expenses.forEach(e => {
      const d = new Date(e.date + 'T00:00:00').getDay();
      days[d] += e.amount;
      counts[d]++;
    });
    const labels = ['CN','T2','T3','T4','T5','T6','T7'];
    return labels.map((label, i) => ({
      label,
      avg: counts[i] > 0 ? Math.round(days[i] / counts[i]) : 0,
      total: days[i]
    }));
  }, [expenses]);

  const maxAvg = Math.max(...data.map(d => d.avg));
  if (maxAvg === 0) return null;

  const W = 300, H = 100, pad = 20, barW = 25;

  return html`
    <div class="mx-4 mt-3 p-4 bg-white dark:bg-zinc-800 rounded-xl border border-zinc-200 dark:border-zinc-700">
      <h3 class="text-sm font-semibold text-zinc-800 dark:text-zinc-200 mb-3">\u{1F4C5} Chi tiêu theo thứ</h3>
      <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">
        ${data.map((d, i) => {
          const barH = maxAvg > 0 ? (d.avg / maxAvg) * (H - pad*2) : 0;
          const x = pad + i * ((W - pad*2) / 7) + ((W - pad*2) / 7 - barW) / 2;
          const y = H - pad - barH;
          const isWeekend = i === 0 || i === 6;
          const isActive = active === i;
          return html`
            <g key=${i} onMouseEnter=${() => setActive(i)} onClick=${() => setActive(active === i ? -1 : i)} style="cursor:pointer">
              <rect x=${x} y=${y} width=${barW} height=${barH} rx="3" fill=${isWeekend ? '#f97316' : '#3b82f6'} opacity=${isActive ? '1' : '0.75'} />
              <text x=${x + barW/2} y=${H - pad + 12} text-anchor="middle" class="fill-zinc-500" style="font-size:8px;font-weight:${isWeekend ? '600' : '400'}">${d.label}</text>
              ${isActive && d.avg > 0 ? html`
                <rect x=${x + barW/2 - 28} y=${y - 18} width="56" height="16" rx="4" fill="#18181b" opacity="0.9" />
                <text x=${x + barW/2} y=${y - 7} text-anchor="middle" fill="white" style="font-size:7px;font-weight:600">${fmtShort(d.avg)}</text>
              ` : d.avg > 0 ? html`<text x=${x + barW/2} y=${y - 3} text-anchor="middle" class="fill-zinc-400" style="font-size:6px">${d.avg >= 1000000 ? (d.avg/1000000).toFixed(1)+'tr' : Math.round(d.avg/1000)+'k'}</text>` : null}
            </g>
          `;
        })}
      </svg>
      <div class="flex items-center justify-center gap-4 mt-1">
        <span class="flex items-center gap-1 text-xs text-zinc-400"><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:#3b82f6"></span> Ngày thường</span>
        <span class="flex items-center gap-1 text-xs text-zinc-400"><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:#f97316"></span> Cuối tuần</span>
      </div>
    </div>
  `;
}

function QRModal({ onClose }) {
  const url = window.location.href;
  const qrRef = useRef(null);

  useEffect(() => {
    if (qrRef.current) {
      qrRef.current.innerHTML = '';
      const qr = qrcode(0, 'M');
      qr.addData(url);
      qr.make();
      const modules = qr.getModuleCount();
      const cellSize = Math.floor(180 / modules);
      const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      const totalSize = modules * cellSize;
      svg.setAttribute('width', totalSize.toString());
      svg.setAttribute('height', totalSize.toString());
      svg.setAttribute('viewBox', '0 0 '+totalSize+' '+totalSize);
      for (let row = 0; row < modules; row++) {
        for (let col = 0; col < modules; col++) {
          if (qr.isDark(row, col)) {
            const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
            rect.setAttribute('x', col * cellSize);
            rect.setAttribute('y', row * cellSize);
            rect.setAttribute('width', cellSize);
            rect.setAttribute('height', cellSize);
            rect.setAttribute('fill', '#000');
            svg.appendChild(rect);
          }
        }
      }
      qrRef.current.appendChild(svg);
    }
  }, [url]);

  return html`
    <div class="fixed inset-0 z-[9999] flex items-center justify-center fade-in" onClick=${onClose}>
      <div class="absolute inset-0 bg-black/60" />
      <div class="relative bg-white dark:bg-zinc-800 rounded-2xl p-8 text-center slide-up shadow-2xl m-4" onClick=${e => e.stopPropagation()}>
        <h3 class="text-base font-semibold text-zinc-800 dark:text-zinc-200 mb-4">Quét để mở trên điện thoại</h3>
        <div ref=${qrRef} class="mx-auto bg-white rounded-xl p-4 inline-flex items-center justify-center" />
        <p class="text-xs text-zinc-400 mt-4 max-w-[250px] mx-auto break-all">${url}</p>
        <button onClick=${onClose} class="mt-5 px-6 py-2.5 text-sm rounded-lg bg-zinc-100 dark:bg-zinc-700 text-zinc-600 dark:text-zinc-300 hover:bg-zinc-200 dark:hover:bg-zinc-600 transition-colors font-medium">Đóng</button>
      </div>
    </div>
  `;
}

function ExpenseRow({ expense, onEdit, onDelete }) {
  const cat = catMap[expense.category] || catMap.other;
  const [offsetX, setOffsetX] = useState(0);
  const [swiping, setSwiping] = useState(false);
  const [isMobile] = useState(() => 'ontouchstart' in window || navigator.maxTouchPoints > 0);
  const startX = useRef(0);
  const currentX = useRef(0);

  const onTouchStart = (e) => { startX.current = e.touches[0].clientX; setSwiping(true); };
  const onTouchMove = (e) => {
    if (!swiping) return;
    const dx = e.touches[0].clientX - startX.current;
    currentX.current = Math.min(0, Math.max(-80, dx));
    setOffsetX(currentX.current);
  };
  const onTouchEnd = () => {
    setSwiping(false);
    setOffsetX(currentX.current < -40 ? -80 : 0);
  };

  const catBg = cat.hex + '1a';

  return html`
    <div class="relative overflow-hidden border-b border-zinc-100 dark:border-zinc-700/50 last:border-0">
      ${isMobile && html`

            Xóa
          </button>
        </div>
      `}
      <div class="relative bg-white dark:bg-zinc-800 flex items-center gap-3 py-3 transition-transform"
        style="${isMobile ? 'transform:translateX('+offsetX+'px);transition-duration:'+(swiping?'0ms':'200ms') : ''}"
        onTouchStart=${isMobile ? onTouchStart : undefined}
        onTouchMove=${isMobile ? onTouchMove : undefined}
        onTouchEnd=${isMobile ? onTouchEnd : undefined}
        onClick=${() => { if (offsetX === 0) onEdit(expense); else setOffsetX(0); }}>
        <div class="shrink-0 w-9 h-9 rounded-lg flex items-center justify-center text-lg" style="background-color:${catBg}">
          ${cat.emoji}
        </div>
        <div class="flex-1 min-w-0">
          <p class="text-sm font-medium text-zinc-800 dark:text-zinc-200 truncate">${expense.detail || cat.name}</p>
          <p class="text-xs text-zinc-400">${cat.name} \u00B7 ${expense.date.slice(8)}/${expense.date.slice(5,7)}</p>
        </div>
        <div class="text-right shrink-0">
          <p class="text-sm font-semibold text-zinc-800 dark:text-zinc-200">-${fmt(expense.amount)}đ</p>
        </div>
        ${!isMobile && html`
          <button onClick=${(e) => { e.stopPropagation(); onDelete(expense.id); }}
            class="shrink-0 p-2 rounded-lg text-zinc-300 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/30 transition-colors opacity-0"
            onMouseEnter=${e => e.currentTarget.style.opacity = 1}
            onMouseLeave=${e => e.currentTarget.style.opacity = 0}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          </button>
        `}
      </div>

  `;

function ExpenseForm({ expense, onSave, onSaveBulk, onClose, allExpenses, dark }) {
  const [date, setDate] = useState(expense?.date || today());
  const [category, setCategory] = useState(expense?.category || 'food');
  const [detail, setDetail] = useState(expense?.detail || '');
  const [amount, setAmount] = useState(expense?.amount?.toString() || '');
  const [scanning, setScanning] = useState(false);
  const [scanPreview, setScanPreview] = useState(null);
  const [scanResults, setScanResults] = useState(null);
  const [catSuggestion, setCatSuggestion] = useState(null);
  const [autoApplied, setAutoApplied] = useState(false);
  const fileRef = useRef(null);
  const amountRef = useRef(null);

  // Duplicate detection
  const duplicates = useMemo(() => {
    const amt = evalAmount(amount);
    return findDuplicates(allExpenses || [], date, amt).filter(e => !expense || e.id !== expense.id);
  }, [date, amount, allExpenses, expense]);

  // Smart category suggestion when detail changes
  const handleDetailChange = (val) => {
    setDetail(val);
    if (!expense && val.length >= 2) {
      const suggestion = catMemory.suggestFromAll(val);
      if (suggestion) {
        setCatSuggestion(suggestion);
        if (!autoApplied) {
          setCategory(suggestion.cat);
          setAutoApplied(true);
        }
      } else {
        setCatSuggestion(null);
      }
    } else {
      setCatSuggestion(null);
    }
  };

  const handleScan = async (e) => {
    const files = Array.from(e.target.files || []);
    if (!files.length) return;
    // Show first image as preview
    setScanPreview(URL.createObjectURL(files[0]));
    setScanning(true);
    setScanResults(null);
    try {
      // Scan all images in parallel
      const allResults = await Promise.all(files.map(f => scanImage(f)));
      const allItems = allResults.flat();
      // Apply smart category from memory to scanned items
      const enhanced = allItems.map(it => {
        const mem = catMemory.suggestFromAll(it.detail);
        if (mem && it.category === 'other') it.category = mem.cat;
        return it;
      });
      if (enhanced.length >= 1) {
        setScanResults(enhanced.map(it => ({ ...it, _id: uid() })));
      }
    } catch (err) {
      console.error('Scan error:', err);
    }
    setScanning(false);
    if (fileRef.current) fileRef.current.value = '';
  };

  const handleSaveBulk = () => {
    if (scanResults && scanResults.length > 0) {
      const cleaned = scanResults.filter(it => it.amount > 0).map(it => {
        const { _id, original_amount, original_currency, exchange_rate, ...rest } = it;
        if (original_currency && original_amount) {
          rest.detail = (rest.detail || '') + ' (' + original_amount + ' ' + original_currency + ')';
        }
        return rest;
      });
      if (cleaned.length > 0) onSaveBulk(cleaned);
    }
  };

  const updateScanItem = (itemId, field, value) => {
    setScanResults(prev => prev.map(item => {
      if (item._id !== itemId) return item;
      const updated = { ...item };
      if (field === 'amount') {
        updated.amount = parseInt(value.replace(/\D/g,'')) || 0;
      } else if (field === 'exchange_rate') {
        const rate = parseFloat(value) || 0;
        updated.exchange_rate = rate;
        if (updated.original_amount && rate > 0) {
          updated.amount = Math.round(updated.original_amount * rate);
        }
      } else {
        updated[field] = value;
      }
      return updated;
    }));
  };

  const deleteScanItem = (itemId) => {
    setScanResults(prev => {
      const next = prev.filter(it => it._id !== itemId);
      return next.length > 0 ? next : null;
    });
  };

  const handleSave = () => {
    const n = evalAmount(amount);
    if (!n || n <= 0) return;
    onSave({ date, category, detail: detail.trim(), amount: n });
  };

  return html`
    <div class="fixed inset-0 z-50 flex items-end sm:items-center justify-center fade-in" onClick=${onClose}>
      <div class="absolute inset-0 bg-black/40" />

          ${expense ? 'Sửa chi tiêu' : 'Thêm chi tiêu'}

        ${!expense && html`
          <div class="mb-4">
            <input ref=${fileRef} type="file" accept="image/*" capture="environment" onChange=${handleScan} class="hidden" id="camera-input" />
            <input type="file" accept="image/*" multiple onChange=${handleScan} class="hidden" id="album-input" />
            ${scanning ? html`

const webauthnSupported = () => window.PublicKeyCredential && navigator.credentials;
const getWebauthnUser = () => load('tc-webauthn-user', '');
const saveWebauthnUser = (u) => save('tc-webauthn-user', u);

function bufToB64url(buf) {
  const bytes = new Uint8Array(buf);
  let s = '';
  bytes.forEach(b => s += String.fromCharCode(b));
  return btoa(s).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}
function b64urlToBuf(b64) {
  const s = atob(b64.replace(/-/g, '+').replace(/_/g, '/'));
  const buf = new Uint8Array(s.length);
  for (let i = 0; i < s.length; i++) buf[i] = s.charCodeAt(i);
  return buf.buffer;
}

async function registerWebAuthn() {
  const res = await fetch('/api/webauthn/register-options', { method: 'POST', headers: authHeaders() });
  if (!res.ok) throw new Error('Không thể tạo yêu cầu đăng ký');
  const options = await res.json();
  // Decode challenge and user.id from base64url
  options.challenge = b64urlToBuf(options.challenge);
  options.user.id = b64urlToBuf(options.user.id);
  if (options.excludeCredentials) {
    options.excludeCredentials = options.excludeCredentials.map(c => ({...c, id: b64urlToBuf(c.id)}));
  }
  const credential = await navigator.credentials.create({ publicKey: options });
  // Encode response for server
  const body = {
    id: credential.id,
    rawId: bufToB64url(credential.rawId),
    type: credential.type,
    response: {
      attestationObject: bufToB64url(credential.response.attestationObject),
      clientDataJSON: bufToB64url(credential.response.clientDataJSON),
    }
  };
  const vRes = await fetch('/api/webauthn/register-verify', {
    method: 'POST', headers: authHeaders(), body: JSON.stringify(body)
  });
  if (!vRes.ok) { const d = await vRes.json(); throw new Error(d.error || 'Lỗi xác minh'); }
  saveWebauthnUser(getStoredUser());
  return true;
}

async function authenticateWebAuthn(userCode) {
  const res = await fetch('/api/webauthn/auth-options', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ user_code: userCode })
  });
  if (!res.ok) { const d = await res.json(); throw new Error(d.error || 'Lỗi'); }
  const options = await res.json();
  options.challenge = b64urlToBuf(options.challenge);
  if (options.allowCredentials) {
    options.allowCredentials = options.allowCredentials.map(c => ({...c, id: b64urlToBuf(c.id)}));
  }
  const assertion = await navigator.credentials.get({ publicKey: options });
  const body = {
    user_code: userCode,
    credential: {
      id: assertion.id,
      rawId: bufToB64url(assertion.rawId),
      type: assertion.type,
      response: {
        authenticatorData: bufToB64url(assertion.response.authenticatorData),
        clientDataJSON: bufToB64url(assertion.response.clientDataJSON),
        signature: bufToB64url(assertion.response.signature),
        userHandle: assertion.response.userHandle ? bufToB64url(assertion.response.userHandle) : null,
      }
    }
  };
  const vRes = await fetch('/api/webauthn/auth-verify', {
    method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body)
  });
  const data = await vRes.json();
  if (!vRes.ok) throw new Error(data.error || 'Lỗi xác minh');
  return data; // { ok, token, user_code }
}

function App() {
  const [userCode, setUC] = useState(() => getStoredUser());

  const [expenses, setExpenses] = useState([]);
  const [budgets, setBudgets] = useState({});
  const [dateFrom, setDateFrom] = useState(() => today().slice(0,8) + '01');
  const [dateTo, setDateTo] = useState(() => today());
  const [modal, setModal] = useState(null);
  const [filterCat, setFilterCat] = useState('all');
  const [showQR, setShowQR] = useState(false);
  const [loading, setLoading] = useState(true);
  const [searchQuery, setSearchQuery] = useState('');
  const [authChecked, setAuthChecked] = useState(false);
  const [showScrollTop, setShowScrollTop] = useState(false);

  useEffect(() => {
    const onScroll = () => setShowScrollTop(window.scrollY > 400);
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  // Verify token on app load
  useEffect(() => {
    const token = getToken();
    if (!token) { setAuthChecked(true); return; }
    fetch('/api/verify', { method: 'POST', headers: { 'Authorization': 'Bearer ' + token } })
      .then(r => r.json())
      .then(d => {
        if (d.ok) { setUC(d.user_code); save('tc-user', d.user_code); }
        else { save('tc-token', ''); save('tc-user', ''); setUC(''); }
      })
      .catch(() => {})
      .finally(() => setAuthChecked(true));
  }, []);

  const handleLogin = (code) => {
    setUC(code);
    setExpenses([]);
    setBudgets({});
    setLoading(true);
  };

  const handleLogout = () => {
    setUC('');
    save('tc-token', '');
    save('tc-user', '');
    setExpenses([]);
    setBudgets({});
  };

  const [faceIdStatus, setFaceIdStatus] = useState('unknown'); // unknown, registered, not_registered
  useEffect(() => {
    if (!userCode || !getToken() || !webauthnSupported()) return;
    fetch('/api/webauthn/status', { headers: authHeaders() })
      .then(r => r.json())
      .then(d => setFaceIdStatus(d.registered ? 'registered' : 'not_registered'))
      .catch(() => {});
  }, [userCode]);

  const handleEnableFaceId = async () => {
    try {
      await registerWebAuthn();
      setFaceIdStatus('registered');
      alert('✅ Face ID đã được bật thành công!');
    } catch (e) {
      alert('❌ ' + (e.message || 'Không thể bật Face ID'));
    }
  };

  if (!authChecked) {
    return html`<div class="min-h-screen flex items-center justify-center bg-zinc-50 dark:bg-zinc-900">
      <div class="text-center"><div class="text-5xl mb-4">💰</div><p class="text-zinc-400 text-sm">Đang kiểm tra...</p></div>
    </div>`;
  }

  if (!userCode || !getToken()) {
    return html`<${LoginScreen} onLogin=${handleLogin} />`;
  }

  const fetchData = useCallback(async () => {
    try {
      const [expData, budData] = await Promise.all([
        apiCall('/api/expenses'),
        apiCall('/api/budgets')
      ]);
      setExpenses(expData);
      setBudgets(budData);
      // Learn category patterns from existing expenses
      catMemory.learnBulk(expData);
    } catch (e) {
      console.error('Failed to fetch:', e);
    } finally {
      setLoading(false);
    }
  }, []);

  useEffect(() => { fetchData(); }, [fetchData, userCode]);
  useEffect(() => {
    let es;
    const connect = () => {
      const token = getToken();
      if (!token) return;
      es = new EventSource('/api/events?token=' + encodeURIComponent(token));
      es.onmessage = () => fetchData();
      es.onerror = () => { es.close(); setTimeout(connect, 3000); };
    };
    connect();
    const onFocus = () => fetchData();
    window.addEventListener('focus', onFocus);
    return () => { es.close(); window.removeEventListener('focus', onFocus); };

  useEffect(() => { save('tc-dark', dark); document.documentElement.classList.toggle('dark', dark); }, [dark]);

    expenses.filter(e => e.date >= dateFrom && e.date <= dateTo).sort((a, b) => b.date.localeCompare(a.date) || (b.id || '').localeCompare(a.id || '')),

  }, [rangeExpenses, filterCat, searchQuery]);

    setModal(null);
    await apiCall('/api/expenses/'+id, { method: 'PUT', body: JSON.stringify(data) });

  const addBulkExpenses = async (items) => {
    items.forEach(it => catMemory.learn(it.detail, it.category));
    const newItems = items.map(item => ({ id: uid(), ...item }));
    setExpenses(prev => [...prev, ...newItems]);
    setModal(null);
    await apiCall('/api/expenses/bulk', { method: 'POST', body: JSON.stringify({ items: newItems }) });
  };

    await apiCall('/api/budgets', { method: 'POST', body: JSON.stringify({ month: budgetMonth, amount: v }) });
  };

                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
                  <rect x="3" y="3" width="18" height="18" rx="4"/>
                  <circle cx="9" cy="10" r="1" fill="currentColor" stroke="none"/>
                  <circle cx="15" cy="10" r="1" fill="currentColor" stroke="none"/>
                  <path d="M9 15c1 1.5 5 1.5 6 0"/>
                </svg>
              </button>
            `}
            <button onClick=${handleLogout} class="p-2 rounded-lg text-zinc-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/30 transition-colors" title="Đổi tài khoản">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            </button>
            <button onClick=${() => setShowQR(true)} class="p-2 rounded-lg text-zinc-400 hover:text-zinc-600 dark:hover:text-zinc-300 hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors" title="QR Code">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="2" width="8" height="8" rx="1"/><rect x="14" y="2" width="8" height="8" rx="1"/><rect x="2" y="14" width="8" height="8" rx="1"/><rect x="14" y="14" width="4" height="4"/><line x1="22" y1="18" x2="22" y2="22"/><line x1="18" y1="22" x2="22" y2="22"/></svg>
            </button>
            <${ExportButton} expenses=${rangeExpenses} />
            <button onClick=${() => setDark(!dark)}
              class="p-2 rounded-lg text-zinc-400 hover:text-zinc-600 dark:hover:text-zinc-300 hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors">
              ${dark ? html`
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
              ` : html`
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
              `}
            </button>
          </div>
        </div>
      </header>

      <main class="max-w-lg mx-auto pb-24">
        <${DateRangePicker} from=${dateFrom} to=${dateTo} onChangeFrom=${setDateFrom} onChangeTo=${setDateTo} />
        <${BudgetBar} total=${rangeTotal} budget=${monthBudget} onSetBudget=${setBudget} month=${budgetMonth} dark=${dark} />
        ${visibleDups.length > 0 && html`
          <div class="px-4 mt-3 space-y-2">
            ${visibleDups.map(group => {
              const dupKey = group[0].date + '|' + group[0].amount;
              return html`
                <div key=${dupKey} class="p-3 rounded-xl flex items-start gap-2 slide-up cursor-pointer" style="background:${dark ? '#422006' : '#fffbeb'};border:1px solid ${dark ? '#92400e' : '#fde68a'}"
                  onClick=${() => {
                    setFilterCat('all');
                    setSearchQuery('');
                    setTimeout(() => {
                      const el = document.getElementById('date-' + group[0].date);
                      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }, 100);
                  }}>
                  <span class="text-base shrink-0 mt-0.5">⚠️</span>
                  <div class="flex-1 min-w-0">
                    <p class="text-xs font-semibold" style="color:${dark ? '#fcd34d' : '#b45309'}">Có ${group.length} khoản giống nhau: ${fmt(group[0].amount)}đ ngày ${group[0].date.slice(5)}</p>
                    <div class="mt-1 space-y-0.5">
                      ${group.map(e => html`
                        <p key=${e.id} class="text-xs truncate" style="color:${dark ? '#fbbf24' : '#d97706'}">
                          ${(catMap[e.category]||catMap.other).emoji} ${e.detail || (catMap[e.category]||catMap.other).name}
                        </p>
                      `)}
                    </div>
                  </div>
                  <button onClick=${(ev) => { ev.stopPropagation(); setDismissedDups(prev => [...prev, dupKey]); }}
                    class="shrink-0 text-sm p-1" style="color:${dark ? '#fbbf24' : '#d97706'}" title="Bỏ qua">✕</button>
                </div>
              `;
            })}
          </div>
        `}
        <${CategoryChart} expenses=${rangeExpenses} />
        <${Dashboard} rangeExpenses=${rangeExpenses} allExpenses=${expenses} budgets=${budgets} onEdit=${(e) => setModal(e)} />

        <div class="px-4 mt-4">
          <div class="relative flex items-center">
            <svg class="absolute" style="left:0.75rem" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#a1a1aa" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" value=${searchQuery} onInput=${e => setSearchQuery(e.target.value)}
              placeholder="Tìm kiếm chi tiêu..."
              class="w-full pl-9 pr-8 py-2 rounded-lg border border-zinc-200 dark:border-zinc-600 bg-white dark:bg-zinc-700 text-zinc-800 dark:text-zinc-200 text-sm placeholder:text-zinc-400 focus:outline-none focus:ring-1 focus:ring-emerald-500" />
            ${searchQuery && html`
              <button onClick=${() => setSearchQuery('')} class="absolute right-2 top-1/2 text-zinc-400 hover:text-zinc-600 text-sm" style="transform:translateY(-50%)">\u00D7</button>
            `}
          </div>
        </div>

        <div class="px-4 mt-3 flex gap-2 overflow-x-auto pb-1 scrollbar-none">
          <button onClick=${() => setFilterCat('all')}
            class="shrink-0 px-3 py-1 rounded-full text-xs font-medium transition-colors ${
              filterCat === 'all' ? 'bg-zinc-800 dark:bg-zinc-200 text-white dark:text-zinc-800' : 'bg-zinc-100 dark:bg-zinc-800 text-zinc-600 dark:text-zinc-400'
            }">Tất cả</button>
          ${[...CATEGORIES].sort((a, b) => (catTotals[b.id] || 0) - (catTotals[a.id] || 0)).map(c => html`
            <button key=${c.id} onClick=${() => setFilterCat(filterCat === c.id ? 'all' : c.id)}
              class="shrink-0 px-3 py-1 rounded-full text-xs font-medium transition-colors ${
                filterCat === c.id ? 'bg-zinc-800 dark:bg-zinc-200 text-white dark:text-zinc-800' : 'bg-zinc-100 dark:bg-zinc-800 text-zinc-600 dark:text-zinc-400'
              }">${c.emoji} ${c.name}</button>
          `)}
        </div>
        ${filterCat !== 'all' && catTotals[filterCat] > 0 && html`
          <div class="px-4 mt-2">
            <div class="px-3 py-2 rounded-lg bg-zinc-100 dark:bg-zinc-800 flex items-center justify-between">
              <span class="text-xs text-zinc-500 dark:text-zinc-400">${(catMap[filterCat] || catMap.other).emoji} ${(catMap[filterCat] || catMap.other).name}</span>
              <span class="text-sm font-bold text-zinc-800 dark:text-zinc-200">${fmtShort(catTotals[filterCat])}</span>
            </div>
          </div>
        `}

        <div class="px-4 mt-3">
          ${grouped.length === 0 && html`
            <div class="text-center py-16">
              <div class="text-5xl mb-3">\u{1F4B0}</div>
              <p class="text-zinc-500 dark:text-zinc-400 text-sm">Chưa có chi tiêu nào</p>
              <p class="text-zinc-400 dark:text-zinc-500 text-xs mt-1">Nhấn nút bên dưới để thêm</p>
            </div>
          `}
          ${grouped.map(([date, items]) => html`
            <div key=${date} id=${'date-' + date} class="mb-4">
              <div class="flex items-center justify-between mb-1 sticky top-[57px] bg-zinc-50 dark:bg-zinc-900 py-1 z-10">
                <span class="text-xs font-semibold text-zinc-500 dark:text-zinc-400 uppercase">${formatDateLabel(date)}</span>
                <span class="text-xs text-zinc-400">${fmt(items.reduce((s,e) => s+e.amount, 0))}đ</span>
              </div>
              <div class="bg-white dark:bg-zinc-800 rounded-xl border border-zinc-200 dark:border-zinc-700 px-3">
                ${items.map(e => html`<${ExpenseRow} key=${e.id} expense=${e} onEdit=${() => setModal(e)} onDelete=${deleteExpense} />`)}
              </div>
            </div>
          `)}
        </div>
      </main>

      ${showScrollTop && html`
        <div class="fixed right-4 flex flex-col gap-2 z-30 slide-up" style="bottom:5.5rem">
          <button onClick=${() => window.scrollTo({ top: 0, behavior: 'smooth' })}
            class="p-2.5 rounded-full bg-zinc-800 dark:bg-zinc-200 text-white dark:text-zinc-800 shadow-lg transition-all active:scale-95" title="Lên đầu">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 10 12 3 19 10"/></svg>
          </button>
          <button onClick=${() => window.scrollBy({ top: -400, behavior: 'smooth' })}
            class="p-2.5 rounded-full bg-zinc-600 dark:bg-zinc-400 text-white dark:text-zinc-800 shadow-lg transition-all active:scale-95" title="Cuộn lên">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="18 15 12 9 6 15"/></svg>
          </button>
          <button onClick=${() => window.scrollBy({ top: 400, behavior: 'smooth' })}
            class="p-2.5 rounded-full bg-zinc-600 dark:bg-zinc-400 text-white dark:text-zinc-800 shadow-lg transition-all active:scale-95" title="Cuộn xuống">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <button onClick=${() => window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' })}
            class="p-2.5 rounded-full bg-zinc-800 dark:bg-zinc-200 text-white dark:text-zinc-800 shadow-lg transition-all active:scale-95" title="Xuống cuối">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="5 14 12 21 19 14"/></svg>
          </button>
        </div>
      `}

      <div class="fixed bottom-6 left-0 right-0 flex justify-center gap-3 z-30">
        <button onClick=${() => setModal('new')}
          class="px-5 py-3 rounded-full bg-emerald-500 hover:bg-emerald-600 text-white font-medium shadow-emerald-500/25 hover:shadow-emerald-500/40 transition-all active:scale-95 flex items-center gap-2">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Thêm chi tiêu
        </button>
      </div>

      ${showQR && html`<${QRModal} onClose=${() => setShowQR(false)} />`}

      ${modal && html`
        <${ExpenseForm}
          expense=${modal === 'new' ? null : modal}
          onSave=${modal === 'new' ? addExpense : updateExpense}
          onSaveBulk=${addBulkExpenses}
          onClose=${() => setModal(null)}
          allExpenses=${expenses}
          dark=${dark}
        />
      `}
    </div>
  `;
}

render(html`<${App} />`, document.getElementById('root'));
</script>
</body>
</html>
