<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thu Chi - Quản lý chi tiêu</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/qrcode-generator@1.4.4/qrcode.js"></script>
<script>
tailwind.config = {
  darkMode: 'class',
  theme: { extend: { fontFamily: { sans: ['system-ui', '-apple-system', 'sans-serif'] } } }
}
</script>
<style>
@keyframes slideUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
.slide-up { animation: slideUp 0.25s ease-out; }
.fade-in { animation: fadeIn 0.2s ease-out; }
body { margin:0; min-height:100vh; }
input[type="number"]::-webkit-inner-spin-button,
input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
input[type="number"] { -moz-appearance: textfield; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo, useRef, useCallback } = React;

// ── Helpers ──
const load = (k, d) => { try { return JSON.parse(localStorage.getItem(k)) || d; } catch { return d; } };
const save = (k, v) => localStorage.setItem(k, JSON.stringify(v));
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
const api = async (path, opts) => {
  const res = await fetch(path, { headers: { 'Content-Type': 'application/json' }, ...opts });
  return res.json();
};
const fmt = (n) => new Intl.NumberFormat('vi-VN').format(n);
const today = () => new Date().toISOString().slice(0, 10);
const monthOf = (d) => d.slice(0, 7);

const CATEGORIES = [
  { id: 'food', name: 'Ăn uống', emoji: '🍜', color: 'bg-orange-500', hex: '#f97316' },
  { id: 'transport', name: 'Di chuyển', emoji: '🚗', color: 'bg-blue-500', hex: '#3b82f6' },
  { id: 'shopping', name: 'Mua sắm', emoji: '🛍️', color: 'bg-pink-500', hex: '#ec4899' },
  { id: 'entertainment', name: 'Giải trí', emoji: '🎬', color: 'bg-purple-500', hex: '#a855f7' },
  { id: 'bills', name: 'Hóa đơn', emoji: '📄', color: 'bg-yellow-500', hex: '#eab308' },
  { id: 'health', name: 'Sức khỏe', emoji: '💊', color: 'bg-green-500', hex: '#22c55e' },
  { id: 'education', name: 'Học tập', emoji: '📚', color: 'bg-indigo-500', hex: '#6366f1' },
  { id: 'other', name: 'Khác', emoji: '📌', color: 'bg-zinc-500', hex: '#71717a' },
];
const catMap = Object.fromEntries(CATEGORIES.map(c => [c.id, c]));

// ── Components ──

function MonthPicker({ value, onChange }) {
  const go = (dir) => {
    const [y, m] = value.split('-').map(Number);
    const d = new Date(y, m - 1 + dir, 1);
    onChange(`${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`);
  };
  const label = (() => {
    const [y, m] = value.split('-').map(Number);
    return `Tháng ${m}, ${y}`;
  })();
  return (
    <div className="flex items-center gap-3">
      <button onClick={() => go(-1)} className="p-1.5 rounded-lg hover:bg-zinc-100 dark:hover:bg-zinc-800 text-zinc-500 transition-colors">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <span className="text-sm font-semibold text-zinc-800 dark:text-zinc-200 min-w-[120px] text-center">{label}</span>
      <button onClick={() => go(1)} className="p-1.5 rounded-lg hover:bg-zinc-100 dark:hover:bg-zinc-800 text-zinc-500 transition-colors">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
  );
}

function BudgetBar({ total, budget, onSetBudget }) {
  const [editing, setEditing] = useState(false);
  const [val, setVal] = useState('');
  const pct = budget > 0 ? Math.min((total / budget) * 100, 100) : 0;
  const over = budget > 0 && total > budget;
  const warn = budget > 0 && total > budget * 0.8 && !over;

  const handleSave = () => {
    const n = parseInt(val.replace(/\D/g, ''));
    if (n > 0) onSetBudget(n); else onSetBudget(0);
    setEditing(false);
  };

  return (
    <div className="px-4 py-3 bg-white dark:bg-zinc-800 border-b border-zinc-200 dark:border-zinc-700">
      <div className="flex items-center justify-between mb-1.5">
        <span className="text-xs text-zinc-500 dark:text-zinc-400">
          Tổng chi: <span className={`font-bold text-sm ${over ? 'text-red-500' : 'text-zinc-800 dark:text-zinc-100'}`}>{fmt(total)}đ</span>
        </span>
        {!editing ? (
          <button onClick={() => { setVal(budget > 0 ? budget.toString() : ''); setEditing(true); }}
            className="text-xs text-zinc-400 hover:text-zinc-600 dark:hover:text-zinc-300 transition-colors">
            {budget > 0 ? `Ngân sách: ${fmt(budget)}đ` : '+ Đặt ngân sách'}
          </button>
        ) : (
          <div className="flex items-center gap-1.5">
            <input value={val} onChange={e => setVal(e.target.value)} placeholder="VD: 5000000"
              className="w-28 px-2 py-0.5 text-xs rounded border border-zinc-300 dark:border-zinc-600 bg-white dark:bg-zinc-700 text-zinc-800 dark:text-zinc-200 focus:outline-none focus:ring-1 focus:ring-emerald-500"
              autoFocus onKeyDown={e => e.key === 'Enter' && handleSave()} />
            <button onClick={handleSave} className="text-xs text-emerald-600 font-medium">OK</button>
            <button onClick={() => setEditing(false)} className="text-xs text-zinc-400">Hủy</button>
          </div>
        )}
      </div>
      {budget > 0 && (
        <div className="h-1.5 bg-zinc-100 dark:bg-zinc-700 rounded-full overflow-hidden">
          <div className={`h-full rounded-full transition-all duration-500 ${over ? 'bg-red-500' : warn ? 'bg-amber-500' : 'bg-emerald-500'}`}
            style={{ width: `${pct}%` }} />
        </div>
      )}
      {over && <p className="text-xs text-red-500 mt-1">⚠️ Vượt ngân sách {fmt(total - budget)}đ</p>}
      {warn && <p className="text-xs text-amber-500 mt-1">Đã dùng {Math.round(pct)}% ngân sách</p>}
    </div>
  );
}

function PieChart({ data, grandTotal }) {
  const size = 140, cx = size/2, cy = size/2, r = 55;
  let cumAngle = -Math.PI / 2;
  const slices = data.map(d => {
    const angle = (d.total / grandTotal) * Math.PI * 2;
    const startAngle = cumAngle;
    cumAngle += angle;
    const endAngle = cumAngle;
    const largeArc = angle > Math.PI ? 1 : 0;
    const x1 = cx + r * Math.cos(startAngle), y1 = cy + r * Math.sin(startAngle);
    const x2 = cx + r * Math.cos(endAngle), y2 = cy + r * Math.sin(endAngle);
    const path = data.length === 1
      ? `M ${cx} ${cy-r} A ${r} ${r} 0 1 1 ${cx-0.001} ${cy-r} Z`
      : `M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${largeArc} 1 ${x2} ${y2} Z`;
    return { ...d, path };
  });
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      {slices.map(s => <path key={s.id} d={s.path} fill={s.hex} opacity="0.85" />)}
      <circle cx={cx} cy={cy} r="30" className="fill-white dark:fill-zinc-800" />
      <text x={cx} y={cy-4} textAnchor="middle" className="fill-zinc-800 dark:fill-zinc-200 text-[11px] font-bold">{fmt(grandTotal)}</text>
      <text x={cx} y={cy+10} textAnchor="middle" className="fill-zinc-400 text-[8px]">VNĐ</text>
    </svg>
  );
}

function CategoryChart({ expenses }) {
  const data = useMemo(() => {
    const totals = {};
    expenses.forEach(e => { totals[e.category] = (totals[e.category] || 0) + e.amount; });
    return CATEGORIES.map(c => ({ ...c, total: totals[c.id] || 0 }))
      .filter(c => c.total > 0)
      .sort((a, b) => b.total - a.total);
  }, [expenses]);

  if (data.length === 0) return null;
  const grandTotal = data.reduce((s, d) => s + d.total, 0);

  return (
    <div className="mx-4 mt-4 p-4 bg-white dark:bg-zinc-800 rounded-xl border border-zinc-200 dark:border-zinc-700">
      <h3 className="text-sm font-semibold text-zinc-800 dark:text-zinc-200 mb-3">Chi tiêu theo danh mục</h3>
      <div className="flex gap-4 items-center">
        <PieChart data={data} grandTotal={grandTotal} />
        <div className="flex-1 space-y-1.5">
          {data.map(d => (
            <div key={d.id} className="flex items-center gap-2 text-xs">
              <span className="w-2.5 h-2.5 rounded-full shrink-0" style={{ backgroundColor: d.hex }}></span>
              <span className="text-zinc-600 dark:text-zinc-400 truncate">{d.emoji} {d.name}</span>
              <span className="ml-auto font-medium text-zinc-700 dark:text-zinc-300 whitespace-nowrap">{Math.round(d.total/grandTotal*100)}%</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function QRModal({ onClose }) {
  const url = window.location.href;
  const qrRef = useRef(null);

  useEffect(() => {
    if (qrRef.current) {
      qrRef.current.innerHTML = '';
      const qr = qrcode(0, 'M');
      qr.addData(url);
      qr.make();
      const modules = qr.getModuleCount();
      const cellSize = Math.floor(180 / modules);
      const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      const totalSize = modules * cellSize;
      svg.setAttribute('width', totalSize.toString());
      svg.setAttribute('height', totalSize.toString());
      svg.setAttribute('viewBox', `0 0 ${totalSize} ${totalSize}`);
      for (let row = 0; row < modules; row++) {
        for (let col = 0; col < modules; col++) {
          if (qr.isDark(row, col)) {
            const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
            rect.setAttribute('x', col * cellSize);
            rect.setAttribute('y', row * cellSize);
            rect.setAttribute('width', cellSize);
            rect.setAttribute('height', cellSize);
            rect.setAttribute('fill', '#000');
            svg.appendChild(rect);
          }
        }
      }
      qrRef.current.appendChild(svg);
    }
  }, [url]);

  return (
    <div className="fixed inset-0 z-[9999] flex items-center justify-center fade-in" onClick={onClose}>
      <div className="absolute inset-0 bg-black/60" />
      <div className="relative bg-white dark:bg-zinc-800 rounded-2xl p-8 text-center slide-up shadow-2xl m-4" onClick={e => e.stopPropagation()}>
        <h3 className="text-base font-semibold text-zinc-800 dark:text-zinc-200 mb-4">Quét để mở trên điện thoại</h3>
        <div ref={qrRef} className="mx-auto bg-white rounded-xl p-4 inline-flex items-center justify-center" />
        <p className="text-xs text-zinc-400 mt-4 max-w-[250px] mx-auto break-all">{url}</p>
        <button onClick={onClose} className="mt-5 px-6 py-2.5 text-sm rounded-lg bg-zinc-100 dark:bg-zinc-700 text-zinc-600 dark:text-zinc-300 hover:bg-zinc-200 dark:hover:bg-zinc-600 transition-colors font-medium">Đóng</button>
      </div>
    </div>
  );
}

function ExpenseRow({ expense, onEdit, onDelete }) {
  const cat = catMap[expense.category] || catMap.other;
  return (
    <div className="slide-up flex items-center gap-3 py-3 border-b border-zinc-100 dark:border-zinc-700/50 last:border-0">
      <div className={`shrink-0 w-9 h-9 rounded-lg ${cat.color} bg-opacity-10 dark:bg-opacity-20 flex items-center justify-center text-lg`}>
        {cat.emoji}
      </div>
      <div className="flex-1 min-w-0">
        <p className="text-sm font-medium text-zinc-800 dark:text-zinc-200 truncate">{expense.detail || cat.name}</p>
        <p className="text-xs text-zinc-400">{cat.name} · {expense.date.slice(8)}/{expense.date.slice(5,7)}</p>
      </div>
      <div className="text-right shrink-0">
        <p className="text-sm font-semibold text-zinc-800 dark:text-zinc-200">-{fmt(expense.amount)}đ</p>
      </div>
      <div className="flex gap-0.5 shrink-0">
        <button onClick={() => onEdit(expense)} className="p-1 rounded text-zinc-300 hover:text-zinc-500 dark:hover:text-zinc-300 transition-colors">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button onClick={() => onDelete(expense.id)} className="p-1 rounded text-zinc-300 hover:text-red-500 transition-colors">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        </button>
      </div>
    </div>
  );
}

function ExpenseForm({ expense, onSave, onClose }) {
  const [date, setDate] = useState(expense?.date || today());
  const [category, setCategory] = useState(expense?.category || 'food');
  const [detail, setDetail] = useState(expense?.detail || '');
  const [amount, setAmount] = useState(expense?.amount?.toString() || '');
  const amountRef = useRef(null);

  const handleSave = () => {
    const n = parseInt(amount.replace(/\D/g, ''));
    if (!n || n <= 0) return;
    onSave({ date, category, detail: detail.trim(), amount: n });
  };

  return (
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center fade-in" onClick={onClose}>
      <div className="absolute inset-0 bg-black/40" />
      <div className="relative w-full max-w-md bg-white dark:bg-zinc-800 rounded-t-2xl sm:rounded-2xl p-5 max-h-[90vh] overflow-y-auto slide-up"
        onClick={e => e.stopPropagation()}>
        <h2 className="text-lg font-semibold text-zinc-900 dark:text-zinc-100 mb-4">
          {expense ? 'Sửa chi tiêu' : 'Thêm chi tiêu'}
        </h2>

        {/* Date */}
        <div className="mb-3">
          <label className="block text-xs font-medium text-zinc-500 dark:text-zinc-400 mb-1">Ngày</label>
          <input type="date" value={date} onChange={e => setDate(e.target.value)}
            className="w-full px-3 py-2 rounded-lg border border-zinc-200 dark:border-zinc-600 bg-white dark:bg-zinc-700 text-zinc-800 dark:text-zinc-200 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500" />
        </div>

        {/* Category */}
        <div className="mb-3">
          <label className="block text-xs font-medium text-zinc-500 dark:text-zinc-400 mb-1">Danh mục</label>
          <div className="grid grid-cols-4 gap-2">
            {CATEGORIES.map(c => (
              <button key={c.id} onClick={() => setCategory(c.id)}
                className={`p-2 rounded-lg border text-center transition-all text-xs ${
                  category === c.id
                    ? 'border-emerald-500 bg-emerald-50 dark:bg-emerald-900/30 text-emerald-700 dark:text-emerald-300 ring-1 ring-emerald-500'
                    : 'border-zinc-200 dark:border-zinc-600 text-zinc-600 dark:text-zinc-400 hover:bg-zinc-50 dark:hover:bg-zinc-700'
                }`}>
                <div className="text-lg mb-0.5">{c.emoji}</div>
                {c.name}
              </button>
            ))}
          </div>
        </div>

        {/* Detail */}
        <div className="mb-3">
          <label className="block text-xs font-medium text-zinc-500 dark:text-zinc-400 mb-1">Chi tiết <span className="text-zinc-300">(tùy chọn)</span></label>
          <input value={detail} onChange={e => setDetail(e.target.value)} placeholder="VD: Cà phê sáng, Grab đi làm..."
            className="w-full px-3 py-2 rounded-lg border border-zinc-200 dark:border-zinc-600 bg-white dark:bg-zinc-700 text-zinc-800 dark:text-zinc-200 text-sm placeholder:text-zinc-400 focus:outline-none focus:ring-2 focus:ring-emerald-500" />
        </div>

        {/* Amount */}
        <div className="mb-5">
          <label className="block text-xs font-medium text-zinc-500 dark:text-zinc-400 mb-1">Số tiền (đ)</label>
          <input ref={amountRef} type="text" inputMode="numeric" value={amount} onChange={e => {
              const raw = e.target.value.replace(/\D/g, '');
              setAmount(raw);
            }}
            placeholder="VD: 50000"
            className="w-full px-3 py-2.5 rounded-lg border border-zinc-200 dark:border-zinc-600 bg-white dark:bg-zinc-700 text-zinc-800 dark:text-zinc-200 text-lg font-semibold placeholder:text-zinc-400 placeholder:font-normal placeholder:text-base focus:outline-none focus:ring-2 focus:ring-emerald-500"
            onKeyDown={e => e.key === 'Enter' && handleSave()}
            autoFocus={!expense} />
          {amount && <p className="text-xs text-zinc-400 mt-1">{fmt(parseInt(amount) || 0)}đ</p>}
        </div>

        {/* Actions */}
        <div className="flex gap-3">
          <button onClick={onClose}
            className="flex-1 py-2.5 rounded-lg border border-zinc-200 dark:border-zinc-600 text-zinc-600 dark:text-zinc-300 font-medium hover:bg-zinc-50 dark:hover:bg-zinc-700 transition-colors text-sm">
            Hủy
          </button>
          <button onClick={handleSave}
            className="flex-1 py-2.5 rounded-lg bg-emerald-500 text-white font-medium hover:bg-emerald-600 transition-colors text-sm disabled:opacity-40"
            disabled={!amount || parseInt(amount) <= 0}>
            {expense ? 'Lưu' : 'Thêm'}
          </button>
        </div>
      </div>
    </div>
  );
}

function ExportButton({ expenses }) {
  const handleExport = () => {
    if (expenses.length === 0) return;
    const header = 'Ngày,Danh mục,Chi tiết,Số tiền\n';
    const rows = expenses.map(e => {
      const cat = catMap[e.category]?.name || e.category;
      return `${e.date},"${cat}","${e.detail || ''}",${e.amount}`;
    }).join('\n');
    const bom = '\uFEFF';
    const blob = new Blob([bom + header + rows], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `chi-tieu-${today()}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  };
  return (
    <button onClick={handleExport} className="p-2 rounded-lg text-zinc-400 hover:text-zinc-600 dark:hover:text-zinc-300 hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors" title="Xuất CSV">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    </button>
  );
}

// ── App ──
function App() {
  const [dark, setDark] = useState(() => load('tc-dark', false));
  const [expenses, setExpenses] = useState([]);
  const [budgets, setBudgets] = useState({});
  const [month, setMonth] = useState(() => today().slice(0, 7));
  const [modal, setModal] = useState(null);
  const [filterCat, setFilterCat] = useState('all');
  const [showQR, setShowQR] = useState(false);
  const [loading, setLoading] = useState(true);

  // Load data from API
  const fetchData = useCallback(async () => {
    try {
      const [expData, budData] = await Promise.all([
        api('/api/expenses'),
        api('/api/budgets')
      ]);
      setExpenses(expData);
      setBudgets(budData);
    } catch (e) {
      console.error('Failed to fetch:', e);
    } finally {
      setLoading(false);
    }
  }, []);

  useEffect(() => { fetchData(); }, [fetchData]);
  useEffect(() => { save('tc-dark', dark); document.documentElement.classList.toggle('dark', dark); }, [dark]);

  const monthExpenses = useMemo(() =>
    expenses.filter(e => monthOf(e.date) === month).sort((a, b) => b.date.localeCompare(a.date) || (b.id || '').localeCompare(a.id || '')),
    [expenses, month]
  );

  const filtered = useMemo(() =>
    filterCat === 'all' ? monthExpenses : monthExpenses.filter(e => e.category === filterCat),
    [monthExpenses, filterCat]
  );

  const monthTotal = useMemo(() => monthExpenses.reduce((s, e) => s + e.amount, 0), [monthExpenses]);
  const monthBudget = budgets[month] || 0;

  const addExpense = async (data) => {
    const newExp = { id: uid(), ...data };
    setExpenses(prev => [...prev, newExp]);
    setModal(null);
    await api('/api/expenses', { method: 'POST', body: JSON.stringify(newExp) });
  };

  const updateExpense = async (data) => {
    const id = modal.id;
    setExpenses(prev => prev.map(e => e.id === id ? { ...e, ...data } : e));
    setModal(null);
    await api(`/api/expenses/${id}`, { method: 'PUT', body: JSON.stringify(data) });
  };

  const deleteExpense = async (id) => {
    setExpenses(prev => prev.filter(e => e.id !== id));
    await api(`/api/expenses/${id}`, { method: 'DELETE' });
  };

  const setBudget = async (v) => {
    setBudgets(prev => ({ ...prev, [month]: v }));
    await api('/api/budgets', { method: 'POST', body: JSON.stringify({ month, amount: v }) });
  };

  // Group filtered by date
  const grouped = useMemo(() => {
    const map = {};
    filtered.forEach(e => {
      if (!map[e.date]) map[e.date] = [];
      map[e.date].push(e);
    });
    return Object.entries(map).sort((a, b) => b[0].localeCompare(a[0]));
  }, [filtered]);

  const formatDateLabel = (d) => {
    const dt = new Date(d + 'T00:00:00');
    const t = today();
    if (d === t) return 'Hôm nay';
    const y = new Date(new Date(t).getTime() - 86400000).toISOString().slice(0,10);
    if (d === y) return 'Hôm qua';
    return dt.toLocaleDateString('vi-VN', { weekday: 'short', day: 'numeric', month: 'numeric' });
  };

  return (
    <div className={`min-h-screen transition-colors ${dark ? 'bg-zinc-900' : 'bg-zinc-50'}`}>
      {/* Header */}
      <header className="sticky top-0 z-40 backdrop-blur-md bg-white/80 dark:bg-zinc-900/80 border-b border-zinc-200 dark:border-zinc-800">
        <div className="max-w-lg mx-auto px-4 py-3 flex items-center justify-between">
          <div>
            <h1 className="text-lg font-bold text-zinc-900 dark:text-zinc-100 tracking-tight">Thu Chi</h1>
          </div>
          <div className="flex items-center gap-1">
            <button onClick={() => setShowQR(true)} className="p-2 rounded-lg text-zinc-400 hover:text-zinc-600 dark:hover:text-zinc-300 hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors" title="QR Code">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><rect x="2" y="2" width="8" height="8" rx="1"/><rect x="14" y="2" width="8" height="8" rx="1"/><rect x="2" y="14" width="8" height="8" rx="1"/><rect x="14" y="14" width="4" height="4"/><line x1="22" y1="18" x2="22" y2="22"/><line x1="18" y1="22" x2="22" y2="22"/></svg>
            </button>
            <ExportButton expenses={monthExpenses} />
            <button onClick={() => setDark(!dark)}
              className="p-2 rounded-lg text-zinc-400 hover:text-zinc-600 dark:hover:text-zinc-300 hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors">
              {dark ? (
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
              ) : (
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
              )}
            </button>
          </div>
        </div>
      </header>

      <main className="max-w-lg mx-auto pb-24">
        {/* Month picker + Budget */}
        <div className="px-4 pt-3 flex justify-center">
          <MonthPicker value={month} onChange={setMonth} />
        </div>
        <BudgetBar total={monthTotal} budget={monthBudget}
          onSetBudget={setBudget} />

        {/* Category chart */}
        <CategoryChart expenses={monthExpenses} />

        {/* Filter */}
        <div className="px-4 mt-4 flex gap-2 overflow-x-auto pb-1 scrollbar-none">
          <button onClick={() => setFilterCat('all')}
            className={`shrink-0 px-3 py-1 rounded-full text-xs font-medium transition-colors ${
              filterCat === 'all' ? 'bg-zinc-800 dark:bg-zinc-200 text-white dark:text-zinc-800' : 'bg-zinc-100 dark:bg-zinc-800 text-zinc-600 dark:text-zinc-400'
            }`}>Tất cả</button>
          {CATEGORIES.map(c => (
            <button key={c.id} onClick={() => setFilterCat(c.id)}
              className={`shrink-0 px-3 py-1 rounded-full text-xs font-medium transition-colors ${
                filterCat === c.id ? 'bg-zinc-800 dark:bg-zinc-200 text-white dark:text-zinc-800' : 'bg-zinc-100 dark:bg-zinc-800 text-zinc-600 dark:text-zinc-400'
              }`}>{c.emoji} {c.name}</button>
          ))}
        </div>

        {/* Expense list */}
        <div className="px-4 mt-3">
          {grouped.length === 0 && (
            <div className="text-center py-16">
              <div className="text-5xl mb-3">💰</div>
              <p className="text-zinc-500 dark:text-zinc-400 text-sm">Chưa có chi tiêu nào</p>
              <p className="text-zinc-400 dark:text-zinc-500 text-xs mt-1">Nhấn nút bên dưới để thêm</p>
            </div>
          )}
          {grouped.map(([date, items]) => (
            <div key={date} className="mb-4">
              <div className="flex items-center justify-between mb-1 sticky top-[57px] bg-zinc-50 dark:bg-zinc-900 py-1 z-10">
                <span className="text-xs font-semibold text-zinc-500 dark:text-zinc-400 uppercase">{formatDateLabel(date)}</span>
                <span className="text-xs text-zinc-400">{fmt(items.reduce((s,e) => s+e.amount, 0))}đ</span>
              </div>
              <div className="bg-white dark:bg-zinc-800 rounded-xl border border-zinc-200 dark:border-zinc-700 px-3">
                {items.map(e => <ExpenseRow key={e.id} expense={e} onEdit={() => setModal(e)} onDelete={deleteExpense} />)}
              </div>
            </div>
          ))}
        </div>
      </main>

      {/* FAB */}
      <div className="fixed bottom-6 left-0 right-0 flex justify-center z-30">
        <button onClick={() => setModal('new')}
          className="px-5 py-3 rounded-full bg-emerald-500 hover:bg-emerald-600 text-white font-medium shadow-lg shadow-emerald-500/25 hover:shadow-emerald-500/40 transition-all active:scale-95 flex items-center gap-2">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Thêm chi tiêu
        </button>
      </div>

      {/* QR Modal */}
      {showQR && <QRModal onClose={() => setShowQR(false)} />}

      {/* Modal */}
      {modal && (
        <ExpenseForm
          expense={modal === 'new' ? null : modal}
          onSave={modal === 'new' ? addExpense : updateExpense}
          onClose={() => setModal(null)}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
