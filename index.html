function PieChart({ data, grandTotal }) {
  const size = 140, cx = size/2, cy = size/2, r = 55;
  let cumAngle = -Math.PI / 2;
  const slices = data.map(d => {
    const angle = (d.total / grandTotal) * Math.PI * 2;
    const startAngle = cumAngle;
    cumAngle += angle;
    const endAngle = cumAngle;
    const largeArc = angle > Math.PI ? 1 : 0;
    const x1 = cx + r * Math.cos(startAngle), y1 = cy + r * Math.sin(startAngle);
    const x2 = cx + r * Math.cos(endAngle), y2 = cy + r * Math.sin(endAngle);
    const path = data.length === 1
      ? 'M '+cx+' '+(cy-r)+' A '+r+' '+r+' 0 1 1 '+(cx-0.001)+' '+(cy-r)+' Z'
      : 'M '+cx+' '+cy+' L '+x1+' '+y1+' A '+r+' '+r+' 0 '+largeArc+' 1 '+x2+' '+y2+' Z';
    return { ...d, path };
  });
  return html`
    <svg width=${size} height=${size} viewBox="0 0 ${size} ${size}">
      ${slices.map(s => html`<path key=${s.id} d=${s.path} fill=${s.hex} opacity="0.85" />`)}
      <circle cx=${cx} cy=${cy} r="30" class="fill-white dark:fill-zinc-800" />
      <text x=${cx} y=${cy-4} text-anchor="middle" class="fill-zinc-800 dark:fill-zinc-200 text-[11px] font-bold">${fmt(grandTotal)}</text>
      <text x=${cx} y=${cy+10} text-anchor="middle" class="fill-zinc-400 text-[8px]">VNƒê</text>
    </svg>
  `;
}

    const totals = {};
    expenses.forEach(e => { totals[e.category] = (totals[e.category] || 0) + e.amount; });
    return CATEGORIES.map(c => ({ ...c, total: totals[c.id] || 0 }))
      .filter(c => c.total > 0)
      .sort((a, b) => b.total - a.total);
  }, [expenses]);

  if (data.length === 0) return null;
  const grandTotal = data.reduce((s, d) => s + d.total, 0);

  return html`

      <h3 class="text-sm font-semibold text-zinc-800 dark:text-zinc-200 mb-3">Chi ti√™u theo danh m·ª•c</h3>

            </div>
          `)}
        </div>
      </div>
    </div>
  `;
}

function QRModal({ onClose }) {
  const url = window.location.href;
  const qrRef = useRef(null);

  useEffect(() => {
    if (qrRef.current) {
      qrRef.current.innerHTML = '';
      const qr = qrcode(0, 'M');
      qr.addData(url);
      qr.make();
      const modules = qr.getModuleCount();
      const cellSize = Math.floor(180 / modules);
      const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      const totalSize = modules * cellSize;
      svg.setAttribute('width', totalSize.toString());
      svg.setAttribute('height', totalSize.toString());
      svg.setAttribute('viewBox', '0 0 '+totalSize+' '+totalSize);
      for (let row = 0; row < modules; row++) {
        for (let col = 0; col < modules; col++) {
          if (qr.isDark(row, col)) {
            const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
            rect.setAttribute('x', col * cellSize);
            rect.setAttribute('y', row * cellSize);
            rect.setAttribute('width', cellSize);
            rect.setAttribute('height', cellSize);
            rect.setAttribute('fill', '#000');
            svg.appendChild(rect);
          }
        }
      }
      qrRef.current.appendChild(svg);
    }
  }, [url]);

  return html`
    <div class="fixed inset-0 z-[9999] flex items-center justify-center fade-in" onClick=${onClose}>
      <div class="absolute inset-0 bg-black/60" />
      <div class="relative bg-white dark:bg-zinc-800 rounded-2xl p-8 text-center slide-up shadow-2xl m-4" onClick=${e => e.stopPropagation()}>
        <h3 class="text-base font-semibold text-zinc-800 dark:text-zinc-200 mb-4">Qu√©t ƒë·ªÉ m·ªü tr√™n ƒëi·ªán tho·∫°i</h3>
        <div ref=${qrRef} class="mx-auto bg-white rounded-xl p-4 inline-flex items-center justify-center" />
        <p class="text-xs text-zinc-400 mt-4 max-w-[250px] mx-auto break-all">${url}</p>
        <button onClick=${onClose} class="mt-5 px-6 py-2.5 text-sm rounded-lg bg-zinc-100 dark:bg-zinc-700 text-zinc-600 dark:text-zinc-300 hover:bg-zinc-200 dark:hover:bg-zinc-600 transition-colors font-medium">ƒê√≥ng</button>
      </div>
    </div>
  `;
}

function ExpenseRow({ expense, onEdit, onDelete }) {
  const cat = catMap[expense.category] || catMap.other;

  const [isMobile] = useState(() => 'ontouchstart' in window || navigator.maxTouchPoints > 0);
  const startX = useRef(0);
  const currentX = useRef(0);

  const onTouchStart = (e) => { startX.current = e.touches[0].clientX; setSwiping(true); };
  const onTouchMove = (e) => {
    if (!swiping) return;
    const dx = e.touches[0].clientX - startX.current;
    currentX.current = Math.min(0, Math.max(-80, dx));
    setOffsetX(currentX.current);
  };
  const onTouchEnd = () => {
    setSwiping(false);
    setOffsetX(currentX.current < -40 ? -80 : 0);
  };

  return html`

function ExportButton({ expenses }) {
  const handleExport = () => {
    if (expenses.length === 0) return;
    const header = 'Ng√Ýy,Danh m·ª•c,Chi ti·∫øt,S·ªë ti·ªÅn\n';
    const rows = expenses.map(e => {
      const cat = catMap[e.category]?.name || e.category;
      return e.date+',"'+cat+'","'+(e.detail||'')+'",'+e.amount;
    }).join('\n');
    const bom = '\uFEFF';
    const blob = new Blob([bom + header + rows], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'chi-tieu-'+today()+'.csv';
    a.click();
    URL.revokeObjectURL(url);
  };
  return html`
    <button onClick=${handleExport} class="p-2 rounded-lg text-zinc-400 hover:text-zinc-600 dark:hover:text-zinc-300 hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors" title="Xu·∫•t CSV">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    </button>
  `;
}

// ‚îÄ‚îÄ App ‚îÄ‚îÄ
function App() {
  const [dark, setDark] = useState(() => load('tc-dark', false));
  const [expenses, setExpenses] = useState([]);
  const [budgets, setBudgets] = useState({});
  const [dateFrom, setDateFrom] = useState(() => today().slice(0,8) + '01');
  const [dateTo, setDateTo] = useState(() => today());
  const [modal, setModal] = useState(null);
  const [filterCat, setFilterCat] = useState('all');
  const [showQR, setShowQR] = useState(false);
  const [loading, setLoading] = useState(true);

  const fetchData = useCallback(async () => {
    try {
      const [expData, budData] = await Promise.all([
        apiCall('/api/expenses'),
        apiCall('/api/budgets')
      ]);
      setExpenses(expData);
      setBudgets(budData);
    } catch (e) {
      console.error('Failed to fetch:', e);
    } finally {
      setLoading(false);
    }
  }, []);

  useEffect(() => { fetchData(); }, [fetchData]);
  useEffect(() => {
    let es;
    const connect = () => {
      es = new EventSource('/api/events');
      es.onmessage = () => fetchData();
      es.onerror = () => { es.close(); setTimeout(connect, 3000); };
    };
    connect();
    const onFocus = () => fetchData();
    window.addEventListener('focus', onFocus);
    return () => { es.close(); window.removeEventListener('focus', onFocus); };
  }, [fetchData]);
  useEffect(() => { save('tc-dark', dark); document.documentElement.classList.toggle('dark', dark); }, [dark]);

  const rangeExpenses = useMemo(() =>
    expenses.filter(e => e.date >= dateFrom && e.date <= dateTo).sort((a, b) => b.date.localeCompare(a.date) || (b.id || '').localeCompare(a.id || '')),
    [expenses, dateFrom, dateTo]
  );

  const filtered = useMemo(() =>
    filterCat === 'all' ? rangeExpenses : rangeExpenses.filter(e => e.category === filterCat),
    [rangeExpenses, filterCat]
  );

  const rangeTotal = useMemo(() => rangeExpenses.reduce((s, e) => s + e.amount, 0), [rangeExpenses]);
  const currentMonth = today().slice(0, 7);
  const monthBudget = budgets[currentMonth] || 0;

  const addExpense = async (data) => {
    const newExp = { id: uid(), ...data };
    setExpenses(prev => [...prev, newExp]);
    setModal(null);
    await apiCall('/api/expenses', { method: 'POST', body: JSON.stringify(newExp) });
  };

  const updateExpense = async (data) => {
    const id = modal.id;
    setExpenses(prev => prev.map(e => e.id === id ? { ...e, ...data } : e));
    setModal(null);
    await apiCall('/api/expenses/'+id, { method: 'PUT', body: JSON.stringify(data) });
  };

  const addBulkExpenses = async (items) => {
    const newItems = items.map(item => ({ id: uid(), ...item }));
    setExpenses(prev => [...prev, ...newItems]);
    setModal(null);
    await apiCall('/api/expenses/bulk', { method: 'POST', body: JSON.stringify({ items: newItems }) });
  };

  const deleteExpense = async (id) => {
    setExpenses(prev => prev.filter(e => e.id !== id));
    await apiCall('/api/expenses/'+id, { method: 'DELETE' });
  };

  const setBudget = async (v) => {
    setBudgets(prev => ({ ...prev, [currentMonth]: v }));
    await apiCall('/api/budgets', { method: 'POST', body: JSON.stringify({ month: currentMonth, amount: v }) });
  };

  const grouped = useMemo(() => {
    const map = {};
    filtered.forEach(e => {
      if (!map[e.date]) map[e.date] = [];
      map[e.date].push(e);
    });
    return Object.entries(map).sort((a, b) => b[0].localeCompare(a[0]));
  }, [filtered]);

  const formatDateLabel = (d) => {
    const dt = new Date(d + 'T00:00:00');
    const t = today();
    if (d === t) return 'H√¥m nay';
    const y = new Date(new Date(t).getTime() - 86400000).toISOString().slice(0,10);
    if (d === y) return 'H√¥m qua';
    return dt.toLocaleDateString('vi-VN', { weekday: 'short', day: 'numeric', month: 'numeric' });
  };

  return html`
    <div class="min-h-screen transition-colors ${dark ? 'bg-zinc-900' : 'bg-zinc-50'}">
      <header class="sticky top-0 z-40 backdrop-blur-md bg-white/80 dark:bg-zinc-900/80 border-b border-zinc-200 dark:border-zinc-800">
        <div class="max-w-lg mx-auto px-4 py-3 flex items-center justify-between">
          <div>
            <h1 class="text-lg font-bold text-zinc-900 dark:text-zinc-100 tracking-tight">Thu Chi</h1>
          </div>
          <div class="flex items-center gap-1">
            <button onClick=${() => setShowQR(true)} class="p-2 rounded-lg text-zinc-400 hover:text-zinc-600 dark:hover:text-zinc-300 hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors" title="QR Code">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="2" width="8" height="8" rx="1"/><rect x="14" y="2" width="8" height="8" rx="1"/><rect x="2" y="14" width="8" height="8" rx="1"/><rect x="14" y="14" width="4" height="4"/><line x1="22" y1="18" x2="22" y2="22"/><line x1="18" y1="22" x2="22" y2="22"/></svg>
            </button>
            <${ExportButton} expenses=${rangeExpenses} />
            <button onClick=${() => setDark(!dark)}
              class="p-2 rounded-lg text-zinc-400 hover:text-zinc-600 dark:hover:text-zinc-300 hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors">
              ${dark ? html`
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
              ` : html`
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
              `}
            </button>
          </div>
        </div>
      </header>

      <main class="max-w-lg mx-auto pb-24">
        <${DateRangePicker} from=${dateFrom} to=${dateTo} onChangeFrom=${setDateFrom} onChangeTo=${setDateTo} />
        <${BudgetBar} total=${rangeTotal} budget=${monthBudget} onSetBudget=${setBudget} />
        <${CategoryChart} expenses=${rangeExpenses} />

        <div class="px-4 mt-4 flex gap-2 overflow-x-auto pb-1 scrollbar-none">
          <button onClick=${() => setFilterCat('all')}
            class="shrink-0 px-3 py-1 rounded-full text-xs font-medium transition-colors ${
              filterCat === 'all' ? 'bg-zinc-800 dark:bg-zinc-200 text-white dark:text-zinc-800' : 'bg-zinc-100 dark:bg-zinc-800 text-zinc-600 dark:text-zinc-400'
            }">T·∫•t c·∫£</button>
          ${CATEGORIES.map(c => html`
            <button key=${c.id} onClick=${() => setFilterCat(c.id)}
              class="shrink-0 px-3 py-1 rounded-full text-xs font-medium transition-colors ${
                filterCat === c.id ? 'bg-zinc-800 dark:bg-zinc-200 text-white dark:text-zinc-800' : 'bg-zinc-100 dark:bg-zinc-800 text-zinc-600 dark:text-zinc-400'
              }">${c.emoji} ${c.name}</button>
          `)}
        </div>

        <div class="px-4 mt-3">
          ${grouped.length === 0 && html`
            <div class="text-center py-16">
              <div class="text-5xl mb-3">\u{1F4B0}</div>
              <p class="text-zinc-500 dark:text-zinc-400 text-sm">Ch∆∞a c√≥ chi ti√™u n√Ýo</p>
              <p class="text-zinc-400 dark:text-zinc-500 text-xs mt-1">Nh·∫•n n√∫t b√™n d∆∞·ªõi ƒë·ªÉ th√™m</p>
            </div>
          `}
          ${grouped.map(([date, items]) => html`
            <div key=${date} class="mb-4">
              <div class="flex items-center justify-between mb-1 sticky top-[57px] bg-zinc-50 dark:bg-zinc-900 py-1 z-10">
                <span class="text-xs font-semibold text-zinc-500 dark:text-zinc-400 uppercase">${formatDateLabel(date)}</span>
                <span class="text-xs text-zinc-400">${fmt(items.reduce((s,e) => s+e.amount, 0))}ƒë</span>
              </div>
              <div class="bg-white dark:bg-zinc-800 rounded-xl border border-zinc-200 dark:border-zinc-700 px-3">
                ${items.map(e => html`<${ExpenseRow} key=${e.id} expense=${e} onEdit=${() => setModal(e)} onDelete=${deleteExpense} />`)}
              </div>
            </div>
          `)}
        </div>
      </main>

      <div class="fixed bottom-6 left-0 right-0 flex justify-center z-30">
        <button onClick=${() => setModal('new')}
          class="px-5 py-3 rounded-full bg-emerald-500 hover:bg-emerald-600 text-white font-medium shadow-emerald-500/25 hover:shadow-emerald-500/40 transition-all active:scale-95 flex items-center gap-2">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Th√™m chi ti√™u
        </button>
      </div>

      ${showQR && html`<${QRModal} onClose=${() => setShowQR(false)} />`}

      ${modal && html`
        <${ExpenseForm}
          expense=${modal === 'new' ? null : modal}
          onSave=${modal === 'new' ? addExpense : updateExpense}
          onSaveBulk=${addBulkExpenses}
          onClose=${() => setModal(null)}
        />
      `}
    </div>
  `;
}

render(html`<${App} />`, document.getElementById('root'));
</script>
</body>
</html>
